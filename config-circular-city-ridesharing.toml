main_directory = "circular-city-ridesharing/"

random_seed = 123454321

[circular_network]
nb_radials = 8
nb_rings = 4
radius = 4000

[road_network]
[road_network.default_speed_limit]
"Radial 1" = 50
"Radial 2" = 50
"Radial 3" = 50
"Radial 4" = 50
"Ring 1" = 50
"Ring 2" = 70
"Ring 3" = 70
"Ring 4" = 70

[road_network.default_nb_lanes]
"Radial 1" = 1
"Radial 2" = 1
"Radial 3" = 1
"Radial 4" = 1
"Ring 1" = 2
"Ring 2" = 2
"Ring 3" = 2
"Ring 4" = 2

[road_network.capacities]
"Radial 1" = 1500
"Radial 2" = 2000
"Radial 3" = 2000
"Radial 4" = 2000
"Ring 1" = 2000
"Ring 2" = 2000
"Ring 3" = 2000
"Ring 4" = 2000

[road_network.hov_lanes]
"Ring 1" = 1
"Ring 2" = 1

[gravity_od_matrix]
exponential_decay = 0.07
trips_per_node = 8000

[mode_choice]
modes = ["car_driver", "car_ridesharing", "public_transit"]
model = "Logit"
mu = 1.0

[modes]
[modes.car_driver]
constant = 0.0
alpha = 10.0

[modes.car_ridesharing]
constant = 2.0
alpha = 11.0

[modes.public_transit]
constant = 2.0
alpha = 15.0
road_network_speed = 40

[departure_time_choice]
model = "ContinuousLogit"
mu = 1.0

[departure_time.linear_schedule]
beta = 6.0
gamma = 25.0
tstar = { mean = 08:00:00, std = 1800, distribution = "Uniform" }

[vehicle_types]
[vehicle_types.car]
ridesharing_passenger_count = 1.2

[fuel]
consumption_factor = 0.08
price = 1.8

[simulation]
period = [06:00:00, 10:00:00]
recording_interval = 300
learning_factor = 0.005
nb_iterations = 200

[metropolis_core]
exec_path = "execs/metropolis_cli"
