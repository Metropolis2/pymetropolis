main_directory = "chambery/output"

crs = "epsg:2154"

osm_file = "chambery/data/rhone-alpes-250101.osm.pbf"

# [ign]
# admin_express_directory = "data/ADMIN-EXPRESS-COG-CARTO_4-0__GPKG_LAMB93_FXX_2025-01-01/"
# contours_iris_directory = "data/CONTOURS-IRIS_3-0__GPKG_LAMB93_FXX_2026-01-01/"

[simulation_area]
# Simulation area is the Chambéry Aire d'attraction.
aav_name = "Chambéry"

[osm_urban_areas]
urban_landuse_tags = [
    "commercial",
    "construction",
    "education",
    "industrial",
    "residential",
    "retail",
    "village_green",
    "recreation_ground",
    "garages",
    "religious",
]
buffer = 50

[osm_road_import]
highways = [
    "motorway",
    "motorway_link",
    "trunk",
    "trunk_link",
    "primary",
    "primary_link",
    "secondary",
    "secondary_link",
    "tertiary",
    "tertiary_link",
    "living_street",
    "unclassified",
    "residential",
]
simulation_area_filter = true
simulation_area_buffer = 8000

[road_network]
# Minimum number of lanes allowed on edges.
min_lanes = 0.5
# Minimum speed limit allowed on edges (in km/h).
min_speed_limit = 10
# Minimum length allowed on edges (in meters).
min_length = 1
# Whether the duplicate edges (edges with same source and target) should be removed.
# Only the edge with the smallest free-flow travel time is kept.
remove_duplicates = false
# Whether the network should be restricted to the largest strongly connected component of the
# underlying graph.
# Warning. If `false`, some origin-destination pairs might not be feasible.
ensure_connected = true
# If `true`, the edges are re-index after the postprocessing so that they are indexed from 0 to n-1.
reindex = false

# Default speed limit per roadtype, in km/h, in rural areas.
[road_network.default_speed_limit.rural]
motorway = 130
trunk = 110
primary = 80
secondary = 80
tertiary = 70
motorway_link = 70
trunk_link = 50
primary_link = 50
secondary_link = 50
tertiary_link = 50
living_street = 20
unclassified = 50
residential = 50
#road = 20
#service = 20

# Default speed limit per roadtype, in km/h, in urban areas.
[road_network.default_speed_limit.urban]
motorway = 130
trunk = 90
primary = 50
secondary = 50
tertiary = 30
motorway_link = 50
trunk_link = 50
primary_link = 50
secondary_link = 50
tertiary_link = 30
living_street = 20
unclassified = 30
residential = 30
#road = 20
#service = 20

# Default number of lanes per roadtype.
[road_network.default_lanes]
motorway = 3
trunk = 2
primary = 1
secondary = 1
tertiary = 1
motorway_link = 1
trunk_link = 1
primary_link = 1
secondary_link = 1
tertiary_link = 1
living_street = 1
unclassified = 1
residential = 1
#road = 1
#service = 1

[osm_pedestrian_import]
highways = [
  "trunk",
  "trunk_link",
  "primary",
  "primary_link",
  "secondary",
  "secondary_link",
  "tertiary",
  "tertiary_link",
  "living_street",
  "unclassified",
  "residential",
  "road",
  "service",
  "track",
  "footway",
  "path",
  "pedestrian",
]
simulation_area_filter = true
simulation_area_buffer = 1000

[pedestrian_network]
# Whether the duplicate edges (edges with same source and target) should be removed.
# Only the edge with the smallest distance is kept.
remove_duplicates = true
# Whether the network should be restricted to the largest strongly connected component of the
# underlying graph.
# Warning. If `false`, some origin-destination pairs might not be feasible.
ensure_connected = true
# If `true`, the edges are re-index after the postprocessing so that they are indexed from 0 to n-1.
reindex = false

[synthetic_population]
eqasim_output = "../ile-de-france/chambery_output/"
fraction = 1.0
